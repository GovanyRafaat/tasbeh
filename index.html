<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarneem</title>
  <link rel="icon" type="image/x-icon" href="logo.ico">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#1b3c59">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>

<header class="top-bar">
  <div class="menu-icon" onclick="toggleMenu()">☰</div>
  <div class="title">Tarneem</div>
  <div class="top-buttons">
    <button class="top-btn" id="externalScreenBtn">اتصال بشاشة خارجية</button>
    <input type="file" id="externalScreenInput" accept="image/*" style="display: none;">
  </div>
</header>

<!-- القائمة الجانبية -->
<div id="sideMenu" class="side-menu" style="display: flex; flex-direction: column; height: 100vh;">

  <div class="menu-section expandable" onclick="toggleDisplayOptions()">
    العرض
  </div>

  <div id="displayOptions" class="submenu">

    <div class="menu-item">
      نوع العرض
      <div class="view-mode-boxes">
        <button id="viewModeSingle" class="view-mode-btn selected">سطر واحد</button>
        <button id="viewModeSlides" class="view-mode-btn">شرائح</button>
      </div>
    </div>

    <div class="menu-item">
      خلفية العرض
      <select id="bgColor">
        <option value="green">أخضر</option>
        <option value="black">أسود</option>
        <option value="white">أبيض</option>
        <option value="image">صورة</option>
        <option value="video">فيديو</option>
      </select>
      <input type="file" id="bgImageInput" accept="image/*" style="display: none;">
      <input type="file" id="bgVideoInput" accept="video/*" style="display: none;">
      <button id="cancelBgBtn" class="cancel-bg-btn" style="display: none;">إلغاء الخلفية</button>
    </div>

    <div class="menu-item toggle-row">
      ظل النص
      <label class="switch">
        <input type="checkbox" id="textShadowToggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="menu-item">
      لون الخط
      <div class="color-input-box">
     <input type="text" id="fontColor" placeholder="#ffffff أو red">
     <div id="colorPreview"></div>
     </div>
    </div>

  </div>

  <div style="margin-top: auto; text-align: center; padding-bottom: 40px;">
    إبتكار: جيوفاني رأفت
  </div>

</div>

<main>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="ابحث عن ترنيمة...">
</div>

<div class="list-box">
  <div class="list-header">القائمة الافتراضية</div>
  <div id="songsContainer"></div>
</div>

</main>

<div id="presentation" class="presentation" aria-hidden="true">
  <img id="presentationImage" class="presentation-media" style="display: none;">
  <video id="presentationVideo" class="presentation-media" loop muted playsinline style="display: none;"></video>
  <div class="presentation-header">
    <div class="presentation-title" id="presentationTitle"></div>
  </div>
  <div class="presentation-body">
    <div id="hymnContainer" class="hymn-container">
      <div id="lineDisplay" class="line-display"></div>
    </div>
  </div>
  <div class="presentation-footer">
    <div id="slideCounter" class="slide-counter"></div>
    <div class="exit-icon" onclick="closePresentation()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
    </div>
  </div>
 </div>

<script src="script.js"></script>
</body>
</html>
